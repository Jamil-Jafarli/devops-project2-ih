name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/burger-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/burger-frontend
  BACKEND_APP_NAME: burger-backend-app
  FRONTEND_APP_NAME: burger-frontend-app
  RESOURCE_GROUP: devops-project-2-group-2
  LOCATION: westeurope
  DB_SERVER_NAME: burger-db-server
  DB_NAME: burgerbuilder

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://burger-backend-app.azurewebsites.net
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create PostgreSQL Flexible Server (if not exists)
        run: |
          if ! az postgres flexible-server show --name ${{ env.DB_SERVER_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            az postgres flexible-server create \
              --name ${{ env.DB_SERVER_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --admin-user ${{ secrets.DB_USERNAME }} \
              --admin-password ${{ secrets.DB_PASSWORD }} \
              --sku-name Standard_B1ms \
              --tier Burstable \
              --version 15 \
              --public-access 0.0.0.0
            az postgres flexible-server db create \
              --server-name ${{ env.DB_SERVER_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --database-name ${{ env.DB_NAME }}
          fi
      - name: Get PostgreSQL hostname
        id: db
        run: |
          DB_HOST=$(az postgres flexible-server show \
            --name ${{ env.DB_SERVER_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query fullyQualifiedDomainName -o tsv)
          echo "host=$DB_HOST" >> $GITHUB_OUTPUT
      - name: Create App Service Plan (if not exists)
        run: |
          if ! az appservice plan show --name burger-plan --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            az appservice plan create \
              --name burger-plan \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --is-linux \
              --sku B1
          fi
      - name: Create backend Web App (if not exists)
        run: |
          if ! az webapp show --name ${{ env.BACKEND_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            az webapp create \
              --name ${{ env.BACKEND_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --plan burger-plan \
              --deployment-container-image-name ${{ env.BACKEND_IMAGE }}:latest
          fi
      - name: Create frontend Web App (if not exists)
        run: |
          if ! az webapp show --name ${{ env.FRONTEND_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} &>/dev/null; then
            az webapp create \
              --name ${{ env.FRONTEND_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --plan burger-plan \
              --deployment-container-image-name ${{ env.FRONTEND_IMAGE }}:latest
          fi
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          images: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Configure backend App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          app-settings-json: |
            [
              { "name": "SPRING_PROFILES_ACTIVE", "value": "docker" },
              { "name": "DB_HOST", "value": "${{ steps.db.outputs.host }}" },
              { "name": "DB_PORT", "value": "5432" },
              { "name": "DB_NAME", "value": "${{ env.DB_NAME }}" },
              { "name": "DB_USERNAME", "value": "${{ secrets.DB_USERNAME }}" },
              { "name": "DB_PASSWORD", "value": "${{ secrets.DB_PASSWORD }}" },
              { "name": "DB_DRIVER", "value": "org.postgresql.Driver" },
              { "name": "SERVER_PORT", "value": "8080" },
              { "name": "CORS_ALLOWED_ORIGINS", "value": "https://${{ env.FRONTEND_APP_NAME }}.azurewebsites.net" },
              { "name": "WEBSITES_PORT", "value": "8080" }
            ]
      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          images: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Configure frontend App Service settings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.FRONTEND_APP_NAME }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          app-settings-json: |
            [
              { "name": "WEBSITES_PORT", "value": "80" },
              { "name": "BACKEND_URL", "value": "${{ env.BACKEND_APP_NAME }}.azurewebsites.net" }
            ]

