name: Terraform – Burger Builder Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
  workflow_call:
    inputs:
      action:
        required: true
        type: string

# Required for OIDC token issuance to authenticate with Azure
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # Remote state – RG is hardcoded, only storage account name is a secret
  TF_STATE_RG:      "devops-project-2-group-2"
  TF_STATE_STORAGE: ${{ secrets.TF_STATE_STORAGE }}

  # Terraform variables passed via environment
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_vm_password: ${{ secrets.VM_PASSWORD }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      # ── Azure login (OIDC) ────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Bootstrap: create RG + storage account if missing ─
      # This runs once on first deploy; subsequent runs are no-ops.
      - name: Bootstrap Remote State Storage
        run: |
          az group create \
            --name "$TF_STATE_RG" \
            --location "westeurope" \
            --output none

          az storage account create \
            --name "$TF_STATE_STORAGE" \
            --resource-group "$TF_STATE_RG" \
            --location "westeurope" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --output none

          az storage container create \
            --name tfstate \
            --account-name "$TF_STATE_STORAGE" \
            --auth-mode login \
            --output none

          # Export storage key so Terraform backend can authenticate without RBAC delays
          STORAGE_KEY=$(az storage account keys list \
            --account-name "$TF_STATE_STORAGE" \
            --resource-group "$TF_STATE_RG" \
            --query "[0].value" -o tsv)

          echo "ARM_ACCESS_KEY=$STORAGE_KEY" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"


      # ── Init ──────────────────────────────────────────────
      - name: Terraform Init
        working-directory: /terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_STATE_RG" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=devops-project-2-group-2.tfstate"

      # ── Import existing resources into state (idempotent) ──
      - name: Import Pre-existing Resources
        working-directory: /terraform
        run: |
          SUB_ID="$ARM_SUBSCRIPTION_ID"
          RG="devops-project-2-group-2"


          # Resource Group (idempotent)
          RG_ID=$(az group show --name "$RG" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_resource_group.main 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$RG_ID" ]; then
            echo "Resource group already imported and matches Azure. Skipping import."
          elif [ -n "$RG_ID" ]; then
            terraform import azurerm_resource_group.main "$RG_ID" 2>/dev/null || true
          fi

          # Azure SQL Server (idempotent)
          SQL_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Sql/servers/burger-builder-db"
          SQL_EXISTS=$(az sql server show --resource-group "$RG" --name "burger-builder-db" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_mssql_server.main 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$SQL_ID" ]; then
            echo "SQL Server already imported and matches Azure. Skipping import."
          elif [ -n "$SQL_EXISTS" ]; then
            terraform import azurerm_mssql_server.main "$SQL_ID" 2>/dev/null || true
          fi

          # Virtual Network (idempotent)
          VNET_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/burger-builder-vnet"
          VNET_EXISTS=$(az network vnet show --resource-group "$RG" --name "burger-builder-vnet" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_virtual_network.main 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$VNET_ID" ]; then
            echo "VNet already imported and matches Azure. Skipping import."
          elif [ -n "$VNET_EXISTS" ]; then
            terraform import azurerm_virtual_network.main "$VNET_ID" 2>/dev/null || true
          fi

          # NSG - frontend (idempotent)
          NSG_FRONTEND_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/frontend-nsg"
          NSG_FRONTEND_EXISTS=$(az network nsg show --resource-group "$RG" --name "frontend-nsg" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_network_security_group.frontend 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$NSG_FRONTEND_ID" ]; then
            echo "Frontend NSG already imported and matches Azure. Skipping import."
          elif [ -n "$NSG_FRONTEND_EXISTS" ]; then
            terraform import azurerm_network_security_group.frontend "$NSG_FRONTEND_ID" 2>/dev/null || true
          fi

          # NSG - backend (idempotent)
          NSG_BACKEND_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/backend-nsg"
          NSG_BACKEND_EXISTS=$(az network nsg show --resource-group "$RG" --name "backend-nsg" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_network_security_group.backend 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$NSG_BACKEND_ID" ]; then
            echo "Backend NSG already imported and matches Azure. Skipping import."
          elif [ -n "$NSG_BACKEND_EXISTS" ]; then
            terraform import azurerm_network_security_group.backend "$NSG_BACKEND_ID" 2>/dev/null || true
          fi

          # Private DNS Zone (idempotent)
          DNS_ZONE_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/privateDnsZones/privatelink.database.windows.net"
          DNS_ZONE_EXISTS=$(az network private-dns zone show --resource-group "$RG" --name "privatelink.database.windows.net" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_private_dns_zone.sql 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$DNS_ZONE_ID" ]; then
            echo "Private DNS zone already imported and matches Azure. Skipping import."
          elif [ -n "$DNS_ZONE_EXISTS" ]; then
            terraform import azurerm_private_dns_zone.sql "$DNS_ZONE_ID" 2>/dev/null || true
          fi

          # Subnet - agw (idempotent)
          SUBNET_AGW_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/burger-builder-vnet/subnets/agw-subnet"
          SUBNET_AGW_EXISTS=$(az network vnet subnet show --resource-group "$RG" --vnet-name "burger-builder-vnet" --name "agw-subnet" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_subnet.agw 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$SUBNET_AGW_ID" ]; then
            echo "AGW subnet already imported and matches Azure. Skipping import."
          elif [ -n "$SUBNET_AGW_EXISTS" ]; then
            terraform import azurerm_subnet.agw "$SUBNET_AGW_ID" 2>/dev/null || true
          fi

          # Subnet - vm (idempotent)
          SUBNET_VM_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/burger-builder-vnet/subnets/vm-subnet"
          SUBNET_VM_EXISTS=$(az network vnet subnet show --resource-group "$RG" --vnet-name "burger-builder-vnet" --name "vm-subnet" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_subnet.vm 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$SUBNET_VM_ID" ]; then
            echo "VM subnet already imported and matches Azure. Skipping import."
          elif [ -n "$SUBNET_VM_EXISTS" ]; then
            terraform import azurerm_subnet.vm "$SUBNET_VM_ID" 2>/dev/null || true
          fi

          # Subnet - db (idempotent)
          SUBNET_DB_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/burger-builder-vnet/subnets/db-subnet"
          SUBNET_DB_EXISTS=$(az network vnet subnet show --resource-group "$RG" --vnet-name "burger-builder-vnet" --name "db-subnet" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_subnet.db 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$SUBNET_DB_ID" ]; then
            echo "DB subnet already imported and matches Azure. Skipping import."
          elif [ -n "$SUBNET_DB_EXISTS" ]; then
            terraform import azurerm_subnet.db "$SUBNET_DB_ID" 2>/dev/null || true
          fi

          # Private DNS Zone VNet Link (idempotent)
          DNS_VNET_LINK_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Network/privateDnsZones/privatelink.database.windows.net/virtualNetworkLinks/sql-vnet-link"
          DNS_VNET_LINK_EXISTS=$(az network private-dns link vnet show --resource-group "$RG" --zone-name "privatelink.database.windows.net" --name "sql-vnet-link" --query id -o tsv 2>/dev/null || echo "")
          STATE_ID=$(terraform state show -no-color azurerm_private_dns_zone_virtual_network_link.sql 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
          if [ "$STATE_ID" = "$DNS_VNET_LINK_ID" ]; then
            echo "Private DNS zone VNet link already imported and matches Azure. Skipping import."
          elif [ -n "$DNS_VNET_LINK_EXISTS" ]; then
            terraform import azurerm_private_dns_zone_virtual_network_link.sql "$DNS_VNET_LINK_ID" 2>/dev/null || true
          fi



            # Subnet-NSG Association - frontend (idempotent, correct import ID)
            FRONTEND_ASSOC_NSG=$(az network vnet subnet show --resource-group "$RG" --vnet-name "burger-builder-vnet" --name "agw-subnet" --query "networkSecurityGroup.id" -o tsv 2>/dev/null || echo "")
            STATE_ID=$(terraform state show -no-color azurerm_subnet_network_security_group_association.frontend 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
            if [ "$STATE_ID" = "$SUBNET_AGW_ID" ]; then
              echo "Frontend association already imported and matches Azure. Skipping import."
            elif [ -n "$FRONTEND_ASSOC_NSG" ]; then
              echo "Importing frontend association: $SUBNET_AGW_ID"
              terraform import azurerm_subnet_network_security_group_association.frontend "$SUBNET_AGW_ID" 2>&1 || echo "Import failed for frontend association"
            else
              echo "No NSG associated with agw-subnet"
            fi

            # Subnet-NSG Association - backend (idempotent, correct import ID)
            BACKEND_ASSOC_NSG=$(az network vnet subnet show --resource-group "$RG" --vnet-name "burger-builder-vnet" --name "vm-subnet" --query "networkSecurityGroup.id" -o tsv 2>/dev/null || echo "")
            STATE_ID=$(terraform state show -no-color azurerm_subnet_network_security_group_association.backend 2>/dev/null | grep '^id\s*=\s*' | awk -F'=' '{print $2}' | xargs || echo "")
            if [ "$STATE_ID" = "$SUBNET_VM_ID" ]; then
              echo "Backend association already imported and matches Azure. Skipping import."
            elif [ -n "$BACKEND_ASSOC_NSG" ]; then
              echo "Importing backend association: $SUBNET_VM_ID"
              terraform import azurerm_subnet_network_security_group_association.backend "$SUBNET_VM_ID" 2>&1 || echo "Import failed for backend association"
            else
              echo "No NSG associated with vm-subnet"
            fi

      # ── Release stale state lock if exists ───────────────
      - name: Release State Lock
        run: |
          az storage blob lease break \
            --account-name "$TF_STATE_STORAGE" \
            --container-name tfstate \
            --blob-name "devops-project-2-group-2.tfstate" \
            --output none 2>/dev/null || true

      # ── Remove NIC association from AGW backend pools ─────
      # Azure disallows two pools referencing the same NIC IP config.
      # This detaches the NIC from both pools so Terraform can apply
      # IP-address-based pools cleanly. Safe to run if AGW doesn't exist yet.
      - name: Detach NIC from AGW Backend Pools
        run: |
          RG="devops-project-2-group-2"
          AGW_EXISTS=$(az network application-gateway show \
            --name burger-builder-agw \
            --resource-group "$RG" \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -n "$AGW_EXISTS" ]; then
            for POOL in frontend-backend-pool api-backend-pool; do
              az network nic ip-config address-pool remove \
                --nic-name burger-builder-nic \
                --ip-config-name internal \
                --resource-group "$RG" \
                --address-pool "$POOL" \
                --gateway-name burger-builder-agw 2>/dev/null || true
            done
          fi

      # ── Validate ──────────────────────────────────────────
      - name: Terraform Validate
        working-directory: /terraform
        run: terraform validate

      # ── Plan ──────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        working-directory: /terraform
        shell: bash
        run: |
          set -o pipefail
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
              const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if Plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # ── Apply ─────────────────────────────────────────────
      - name: Terraform Apply
        if: |
          steps.plan.outcome == 'success' &&
          ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
        working-directory: /terraform
        run: terraform apply -auto-approve tfplan

      # ── Sync SQL Server password with DB_PASSWORD secret ────
      # terraform import does not apply administrator_login_password.
      # This step forces the password to match the secret after every apply.
      - name: Sync SQL Server Password
        if: |
          steps.plan.outcome == 'success' &&
          ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
        run: |
          az sql server update \
            --resource-group "devops-project-2-group-2" \
            --name "burger-builder-db" \
            --admin-password "${{ secrets.DB_PASSWORD }}"

      # ── Print sensitive outputs ───────────────────────────
      - name: Print Credentials
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        working-directory: /terraform
        run: |
          echo "VM Password: $(terraform output -raw vm_password)"
          echo "DB FQDN: $(terraform output -raw db_fqdn)"

      # ── Destroy (manual only) ─────────────────────────────
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        working-directory: /terraform
        run: terraform destroy -auto-approve