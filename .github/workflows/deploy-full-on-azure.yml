name: Terraform – Burger Builder Infrastructure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

# Required for OIDC token issuance to authenticate with Azure
permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # Remote state – RG is hardcoded, only storage account name is a secret
  TF_STATE_RG:      "devops-project-2-group-2"
  TF_STATE_STORAGE: ${{ secrets.TF_STATE_STORAGE }}

  # Terraform variables passed via environment
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_vm_password: ${{ secrets.VM_PASSWORD }}

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    steps:
      # ── Azure login (OIDC) ────────────────────────────────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Bootstrap: create RG + storage account if missing ─
      # This runs once on first deploy; subsequent runs are no-ops.
      - name: Bootstrap Remote State Storage
        run: |
          az group create \
            --name "$TF_STATE_RG" \
            --location "westeurope" \
            --output none

          az storage account create \
            --name "$TF_STATE_STORAGE" \
            --resource-group "$TF_STATE_RG" \
            --location "westeurope" \
            --sku Standard_LRS \
            --allow-blob-public-access false \
            --output none

          az storage container create \
            --name tfstate \
            --account-name "$TF_STATE_STORAGE" \
            --auth-mode login \
            --output none

          # Export storage key so Terraform backend can authenticate without RBAC delays
          STORAGE_KEY=$(az storage account keys list \
            --account-name "$TF_STATE_STORAGE" \
            --resource-group "$TF_STATE_RG" \
            --query "[0].value" -o tsv)

          echo "ARM_ACCESS_KEY=$STORAGE_KEY" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      # ── Write embedded main.tf ─────────────────────────────
      - name: Write main.tf
        run: |
          mkdir -p infra
          cat > infra/main.tf << 'TFEOF'
          terraform {
            required_providers {
              azurerm = {
                source  = "hashicorp/azurerm"
                version = "~> 4.0"
              }
              random = {
                source  = "hashicorp/random"
                version = "~> 3.0"
              }
              tls = {
                source  = "hashicorp/tls"
                version = "~> 4.0"
              }
            }
            backend "azurerm" {}
          }

          provider "azurerm" {
            features {}
            use_oidc = true
          }

          provider "random" {}
          provider "tls" {}

          variable "db_password" {
            description = "SQL Server administrator password"
            type        = string
            sensitive   = true
          }

          variable "vm_password" {
            description = "VM administrator password"
            type        = string
            sensitive   = true
          }

          locals {
            rg_name  = "devops-project-2-group-2"
            location = "West Europe"

            frontend_pool_name          = "frontend-backend-pool"
            api_pool_name               = "api-backend-pool"
            frontend_http_settings_name = "frontend-http-settings"
            api_http_settings_name      = "api-http-settings"
            agw_frontend_ip_name        = "agw-frontend-ip"
            agw_frontend_port_name      = "agw-frontend-port"
            agw_listener_name           = "agw-http-listener"
            agw_routing_rule_name       = "agw-routing-rule"
            agw_url_path_map_name       = "agw-url-path-map"
            agw_api_path_rule_name      = "agw-api-path-rule"
          }

          resource "azurerm_resource_group" "main" {
            name     = local.rg_name
            location = local.location
          }

          resource "azurerm_virtual_network" "main" {
            name                = "burger-builder-vnet"
            address_space       = ["10.0.1.0/24"]
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name
          }

          resource "azurerm_subnet" "agw" {
            name                 = "agw-subnet"
            resource_group_name  = azurerm_resource_group.main.name
            virtual_network_name = azurerm_virtual_network.main.name
            address_prefixes     = ["10.0.1.0/26"]
          }

          resource "azurerm_subnet" "vm" {
            name                 = "vm-subnet"
            resource_group_name  = azurerm_resource_group.main.name
            virtual_network_name = azurerm_virtual_network.main.name
            address_prefixes     = ["10.0.1.64/27"]
          }

          resource "azurerm_subnet" "db" {
            name                 = "db-subnet"
            resource_group_name  = azurerm_resource_group.main.name
            virtual_network_name = azurerm_virtual_network.main.name
            address_prefixes     = ["10.0.1.96/27"]
            private_endpoint_network_policies = "Disabled"
          }

          # NSG – Frontend (AGW subnet)
          resource "azurerm_network_security_group" "frontend" {
            name                = "frontend-nsg"
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name

            security_rule {
              name                       = "allow-http-inbound"
              priority                   = 100
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "Tcp"
              source_port_range          = "*"
              destination_port_range     = "80"
              source_address_prefix      = "Internet"
              destination_address_prefix = "*"
            }

            security_rule {
              name                       = "allow-gateway-manager"
              priority                   = 110
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "Tcp"
              source_port_range          = "*"
              destination_port_range     = "65200-65535"
              source_address_prefix      = "GatewayManager"
              destination_address_prefix = "*"
            }

            security_rule {
              name                       = "allow-azure-load-balancer"
              priority                   = 120
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "*"
              source_port_range          = "*"
              destination_port_range     = "*"
              source_address_prefix      = "AzureLoadBalancer"
              destination_address_prefix = "*"
            }
          }

          resource "azurerm_subnet_network_security_group_association" "frontend" {
            subnet_id                 = azurerm_subnet.agw.id
            network_security_group_id = azurerm_network_security_group.frontend.id
          }

          # NSG – Backend (VM subnet)
          resource "azurerm_network_security_group" "backend" {
            name                = "backend-nsg"
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name

            security_rule {
              name                       = "allow-ssh-inbound"
              priority                   = 120
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "Tcp"
              source_port_range          = "*"
              destination_port_range     = "22"
              source_address_prefix      = "*"
              destination_address_prefix = "*"
            }

            security_rule {
              name                       = "allow-agw-to-frontend-port"
              priority                   = 100
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "Tcp"
              source_port_range          = "*"
              destination_port_range     = "5173"
              source_address_prefix      = "10.0.1.0/26"
              destination_address_prefix = "*"
            }

            security_rule {
              name                       = "allow-agw-to-api-port"
              priority                   = 110
              direction                  = "Inbound"
              access                     = "Allow"
              protocol                   = "Tcp"
              source_port_range          = "*"
              destination_port_range     = "8080"
              source_address_prefix      = "10.0.1.0/26"
              destination_address_prefix = "*"
            }

            security_rule {
              name                       = "deny-all-other-inbound"
              priority                   = 4096
              direction                  = "Inbound"
              access                     = "Deny"
              protocol                   = "*"
              source_port_range          = "*"
              destination_port_range     = "*"
              source_address_prefix      = "*"
              destination_address_prefix = "*"
            }
          }

          resource "azurerm_subnet_network_security_group_association" "backend" {
            subnet_id                 = azurerm_subnet.vm.id
            network_security_group_id = azurerm_network_security_group.backend.id
          }

          resource "azurerm_public_ip" "agw" {
            name                = "agw-public-ip"
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name
            allocation_method   = "Static"
            sku                 = "Standard"
          }

          resource "tls_private_key" "vm_ssh" {
            algorithm = "RSA"
            rsa_bits  = 4096
          }

          resource "azurerm_network_interface" "vm" {
            name                = "burger-builder-nic"
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name

            ip_configuration {
              name                          = "internal"
              subnet_id                     = azurerm_subnet.vm.id
              private_ip_address_allocation = "Static"
              private_ip_address            = "10.0.1.68"
            }
          }

          resource "azurerm_linux_virtual_machine" "main" {
            name                            = "burger-builder-vm"
            location                        = azurerm_resource_group.main.location
            resource_group_name             = azurerm_resource_group.main.name
            size                            = "Standard_D2s_v3"
            admin_username                  = "adminuser"
            admin_password                  = var.vm_password
            network_interface_ids           = [azurerm_network_interface.vm.id]
            disable_password_authentication = false

            admin_ssh_key {
              username   = "adminuser"
              public_key = tls_private_key.vm_ssh.public_key_openssh
            }

            os_disk {
              caching              = "ReadWrite"
              storage_account_type = "Premium_LRS"
            }

            source_image_reference {
              publisher = "Canonical"
              offer     = "0001-com-ubuntu-server-jammy"
              sku       = "22_04-lts"
              version   = "latest"
            }
          }

          resource "azurerm_private_dns_zone" "sql" {
            name                = "privatelink.database.windows.net"
            resource_group_name = azurerm_resource_group.main.name
          }

          resource "azurerm_private_dns_zone_virtual_network_link" "sql" {
            name                  = "sql-vnet-link"
            private_dns_zone_name = azurerm_private_dns_zone.sql.name
            virtual_network_id    = azurerm_virtual_network.main.id
            resource_group_name   = azurerm_resource_group.main.name
            registration_enabled  = false
          }

          resource "azurerm_mssql_server" "main" {
            name                          = "burger-builder-db"
            resource_group_name           = azurerm_resource_group.main.name
            location                      = azurerm_resource_group.main.location
            version                       = "12.0"
            administrator_login           = "dbadmin"
            administrator_login_password  = var.db_password
            public_network_access_enabled = false
          }

          resource "azurerm_mssql_database" "app" {
            name      = "burgerbuilder"
            server_id = azurerm_mssql_server.main.id
            sku_name  = "Basic"
          }

          resource "azurerm_private_endpoint" "sql" {
            name                = "sql-private-endpoint"
            location            = azurerm_resource_group.main.location
            resource_group_name = azurerm_resource_group.main.name
            subnet_id           = azurerm_subnet.db.id

            private_service_connection {
              name                           = "sql-private-connection"
              private_connection_resource_id = azurerm_mssql_server.main.id
              subresource_names              = ["sqlServer"]
              is_manual_connection           = false
            }

            private_dns_zone_group {
              name                 = "sql-dns-zone-group"
              private_dns_zone_ids = [azurerm_private_dns_zone.sql.id]
            }
          }

          # WAF Policy: /api/* yalnız aşağıdakı IP-lərdən əlçatan olsun.
          # XƏBƏRDARLIQ: Brauzer-əsaslı SPA istifadəçiləri xarici IP ilə gəlir;
          # onların /api/* çağırışları da bloklanacaq. Yalnız server-to-server
          # və ya VPN/VNet daxili istifadə üçün uyğundur.
          resource "azurerm_web_application_firewall_policy" "main" {
            name                = "burger-builder-waf-policy"
            resource_group_name = azurerm_resource_group.main.name
            location            = azurerm_resource_group.main.location

            # Custom rule: /api/* ünvanına yalnız icazəli IP-lərdən icazə ver
            custom_rules {
              name      = "BlockAPIFromInternet"
              priority  = 1
              rule_type = "MatchRule"
              action    = "Block"

              # Şərt 1: URI /api/ ilə başlayır
              match_conditions {
                match_variables {
                  variable_name = "RequestUri"
                }
                operator           = "BeginsWith"
                negation_condition = false
                match_values       = ["/api/"]
              }

              # Şərt 2: Mənbə IP icazəli siyahıda DEYİL → blokla
              match_conditions {
                match_variables {
                  variable_name = "RemoteAddr"
                }
                operator           = "IPMatch"
                negation_condition = true
                match_values       = ["10.0.1.0/24", "52.236.138.163"]
              }
            }

            managed_rules {
              managed_rule_set {
                type    = "OWASP"
                version = "3.2"

                rule_group_override {
                  rule_group_name = "REQUEST-920-PROTOCOL-ENFORCEMENT"
                  rule {
                    id      = "920300"
                    enabled = false
                  }
                  rule {
                    id      = "920320"
                    enabled = false
                  }
                }
              }
            }

            policy_settings {
              enabled                     = true
              mode                        = "Prevention"
              file_upload_limit_in_mb     = 30
              max_request_body_size_in_kb = 128
              request_body_check          = true
            }
          }

          resource "azurerm_application_gateway" "main" {
            name                = "burger-builder-agw"
            resource_group_name = azurerm_resource_group.main.name
            location            = azurerm_resource_group.main.location

            firewall_policy_id = azurerm_web_application_firewall_policy.main.id

            sku {
              name     = "WAF_v2"
              tier     = "WAF_v2"
              capacity = 1
            }

            gateway_ip_configuration {
              name      = "agw-ip-config"
              subnet_id = azurerm_subnet.agw.id
            }

            frontend_ip_configuration {
              name                 = local.agw_frontend_ip_name
              public_ip_address_id = azurerm_public_ip.agw.id
            }

            frontend_port {
              name = local.agw_frontend_port_name
              port = 80
            }

            backend_address_pool {
              name         = local.frontend_pool_name
              ip_addresses = ["10.0.1.68"]
            }

            backend_address_pool {
              name         = local.api_pool_name
              ip_addresses = ["10.0.1.68"]
            }

            probe {
              name                = "frontend-health-probe"
              host                = "10.0.1.68"
              protocol            = "Http"
              path                = "/"
              interval            = 30
              timeout             = 30
              unhealthy_threshold = 3
              match {
                status_code = ["200-599"]
              }
            }

            probe {
              name                = "api-health-probe"
              host                = "10.0.1.68"
              protocol            = "Http"
              path                = "/api/ingredients"
              interval            = 30
              timeout             = 30
              unhealthy_threshold = 3
              match {
                status_code = ["200-599"]
              }
            }

            backend_http_settings {
              name                  = local.frontend_http_settings_name
              cookie_based_affinity = "Disabled"
              port                  = 5173
              protocol              = "Http"
              request_timeout       = 60
              probe_name            = "frontend-health-probe"
            }

            backend_http_settings {
              name                  = local.api_http_settings_name
              cookie_based_affinity = "Disabled"
              port                  = 8080
              protocol              = "Http"
              request_timeout       = 60
              probe_name            = "api-health-probe"
            }

            http_listener {
              name                           = local.agw_listener_name
              frontend_ip_configuration_name = local.agw_frontend_ip_name
              frontend_port_name             = local.agw_frontend_port_name
              protocol                       = "Http"
            }

            url_path_map {
              name                               = local.agw_url_path_map_name
              default_backend_address_pool_name  = local.frontend_pool_name
              default_backend_http_settings_name = local.frontend_http_settings_name

              path_rule {
                name                       = local.agw_api_path_rule_name
                paths                      = ["/api/*"]
                backend_address_pool_name  = local.api_pool_name
                backend_http_settings_name = local.api_http_settings_name
              }
            }

            request_routing_rule {
              name               = local.agw_routing_rule_name
              rule_type          = "PathBasedRouting"
              http_listener_name = local.agw_listener_name
              url_path_map_name  = local.agw_url_path_map_name
              priority           = 10
            }
          }

          output "app_gateway_public_ip" {
            description = "Public IP of the Application Gateway"
            value       = azurerm_public_ip.agw.ip_address
          }

          output "vm_private_ip" {
            description = "Static private IP of the VM"
            value       = azurerm_network_interface.vm.private_ip_address
          }

          output "db_fqdn" {
            description = "FQDN of the SQL Server"
            value       = azurerm_mssql_server.main.fully_qualified_domain_name
          }

          output "vm_ssh_private_key" {
            description = "SSH private key – never commit to source control"
            value       = tls_private_key.vm_ssh.private_key_pem
            sensitive   = true
          }

          output "vm_password" {
            description = "VM admin password"
            value       = var.vm_password
            sensitive   = true
          }
          TFEOF

      # ── Init ──────────────────────────────────────────────
      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="resource_group_name=$TF_STATE_RG" \
            -backend-config="storage_account_name=$TF_STATE_STORAGE" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=devops-project-2-group-2.tfstate"

      # ── Import existing resources into state (idempotent) ──
      - name: Import Pre-existing Resources
        working-directory: infra
        run: |
          SUB_ID="$ARM_SUBSCRIPTION_ID"
          RG="devops-project-2-group-2"

          # Resource Group
          RG_ID=$(az group show --name "$RG" --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$RG_ID" ]; then
            terraform import azurerm_resource_group.main "$RG_ID" 2>/dev/null || true
          fi

          # Azure SQL Server
          SQL_ID="/subscriptions/$SUB_ID/resourceGroups/$RG/providers/Microsoft.Sql/servers/burger-builder-db"
          SQL_EXISTS=$(az sql server show --resource-group "$RG" --name "burger-builder-db" --query id -o tsv 2>/dev/null || echo "")
          if [ -n "$SQL_EXISTS" ]; then
            terraform import azurerm_mssql_server.main "$SQL_ID" 2>/dev/null || true
          fi

      # ── Release stale state lock if exists ───────────────
      - name: Release State Lock
        run: |
          az storage blob lease break \
            --account-name "$TF_STATE_STORAGE" \
            --container-name tfstate \
            --blob-name "devops-project-2-group-2.tfstate" \
            --output none 2>/dev/null || true

      # ── Remove NIC association from AGW backend pools ─────
      # Azure disallows two pools referencing the same NIC IP config.
      # This detaches the NIC from both pools so Terraform can apply
      # IP-address-based pools cleanly. Safe to run if AGW doesn't exist yet.
      - name: Detach NIC from AGW Backend Pools
        run: |
          RG="devops-project-2-group-2"
          AGW_EXISTS=$(az network application-gateway show \
            --name burger-builder-agw \
            --resource-group "$RG" \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -n "$AGW_EXISTS" ]; then
            for POOL in frontend-backend-pool api-backend-pool; do
              az network nic ip-config address-pool remove \
                --nic-name burger-builder-nic \
                --ip-config-name internal \
                --resource-group "$RG" \
                --address-pool "$POOL" \
                --gateway-name burger-builder-agw 2>/dev/null || true
            done
          fi

      # ── Validate ──────────────────────────────────────────
      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      # ── Plan ──────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        working-directory: infra
        shell: bash
        run: |
          set -o pipefail
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Fail if Plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # ── Apply ─────────────────────────────────────────────
      - name: Terraform Apply
        if: |
          steps.plan.outcome == 'success' &&
          ((github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      # ── Print sensitive outputs ───────────────────────────
      - name: Print Credentials
        if: |
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        working-directory: infra
        run: |
          echo "VM Password: $(terraform output -raw vm_password)"
          echo "DB FQDN: $(terraform output -raw db_fqdn)"

      # ── Destroy (manual only) ─────────────────────────────
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        working-directory: infra
        run: terraform destroy -auto-approve
