name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e

            if [ -d "$HOME/devops-project2-ih/.git" ]; then
              cd $HOME/devops-project2-ih
              git pull origin main
            else
              git clone https://github.com/saurabhd2106/devops-project2-ih.git $HOME/devops-project2-ih
              cd $HOME/devops-project2-ih
            fi

            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker $USER
            fi

            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" \
                -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
            fi

            cd $HOME/devops-project2-ih

            sudo docker-compose down --remove-orphans || true
            sudo docker-compose up --build -d

            sudo docker-compose ps

            sleep 45

            curl -sf http://localhost:8080/api/ingredients && echo "Backend OK" || echo "Backend XETA"
            curl -sf http://localhost:80 > /dev/null && echo "Frontend OK" || echo "Frontend XETA"
