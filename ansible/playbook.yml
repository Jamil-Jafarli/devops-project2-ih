---
- name: Deploy Burger Builder Application
  hosts: vm
  become: true

  vars:
    app_user: adminuser
    repo_url: https://github.com/Jamil-Jafarli/devops-project2-ih.git
    app_dir: /home/adminuser/devops-project2-ih
    # DB credentials – ansible-playbook --extra-vars "db_password=... db_fqdn=burger-builder-db.database.windows.net" ilə ötürün
    db_fqdn: burger-builder-db.database.windows.net
    db_name: burgerbuilder
    db_username: dbadmin
    db_password: "m_D0BkBu<%vka5+swmAp"                    # --extra-vars ilə ötürülməlidir
    server_port: 8080
    cors_origins: "http://52.236.138.163"

  tasks:

    # ── System ────────────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # ── Java & Maven ──────────────────────────────────────────
    - name: Install OpenJDK 21
      apt:
        name: openjdk-21-jdk
        state: present

    - name: Install Maven
      apt:
        name: maven
        state: present

    # ── Node.js 22 (NodeSource) ───────────────────────────────
    - name: Add NodeSource setup script
      shell: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js 22
      apt:
        name: nodejs
        state: present
        update_cache: yes

    # ── Clone Repository ──────────────────────────────────────
    - name: Clone application repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: "{{ app_user }}"

    # ── Frontend dependencies ─────────────────────────────────
    - name: Install frontend npm dependencies
      community.general.npm:
        path: "{{ app_dir }}/frontend"
      become_user: "{{ app_user }}"

    - name: Install Vite locally
      community.general.npm:
        name: vite
        path: "{{ app_dir }}/frontend"
      become_user: "{{ app_user }}"

    # ── DB config: external application.properties (overrides classpath) ────
    - name: Write external application.properties for backend
      copy:
        dest: "{{ app_dir }}/backend/application.properties"
        owner: "{{ app_user }}"
        mode: '0600'
        content: |
          spring.datasource.url=jdbc:sqlserver://{{ db_fqdn }}:1433;database={{ db_name }};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
          spring.datasource.username={{ db_username }}
          spring.datasource.password={{ db_password }}
          spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
          server.port={{ server_port }}

    # ── Systemd: backend.service ──────────────────────────────
    - name: Create backend.service
      copy:
        dest: /etc/systemd/system/backend.service
        content: |
          [Unit]
          Description=Burger Builder Backend (Spring Boot)
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}/backend
          EnvironmentFile={{ app_dir }}/backend/environment.env
          ExecStart=/usr/bin/mvn spring-boot:run
          Restart=on-failure
          RestartSec=15
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    # ── Systemd: frontend.service ─────────────────────────────
    - name: Create frontend.service
      copy:
        dest: /etc/systemd/system/frontend.service
        content: |
          [Unit]
          Description=Burger Builder Frontend (Vite dev server)
          After=network.target

          [Service]
          Type=simple
          User={{ app_user }}
          WorkingDirectory={{ app_dir }}/frontend
          ExecStart=/usr/bin/npm run dev -- --host 0.0.0.0
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target

    # ── Enable & Start services (systemctl enable --now) ─────
    - name: Reload systemd daemon, enable and start backend
      systemd:
        name: backend
        daemon_reload: yes
        enabled: yes
        state: started

    - name: Enable and start frontend
      systemd:
        name: frontend
        enabled: yes
        state: started
